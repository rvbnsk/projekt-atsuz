spring:
  application:
    name: editorial-archive-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/editorial_archive}
    username: ${DB_USERNAME:archive_user}
    password: ${DB_PASSWORD:archive_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID:changeme}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:changeme}
            scope: email,profile
          facebook:
            client-id: ${OAUTH2_FACEBOOK_CLIENT_ID:changeme}
            client-secret: ${OAUTH2_FACEBOOK_CLIENT_SECRET:changeme}
            scope: email,public_profile

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

app:
  jwt:
    secret: ${JWT_SECRET:2d7e4f1a83bc65094d2e7f1a83bc65094d2e7f1a83bc65094d2e7f1a83bc6509}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:editorial-archive}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:us-east-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
