version: '3.9'

# Docker Compose dla lokalnego developmentu (tylko infrastruktura)
# Backend i frontend uruchamiane lokalnie (mvn spring-boot:run / npm run dev)

services:
  db:
    image: postgres:15-alpine
    container_name: editorial_db_dev
    environment:
      POSTGRES_DB: editorial_archive
      POSTGRES_USER: archive_user
      POSTGRES_PASSWORD: archive_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: editorial_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data

volumes:
  postgres_dev_data:
  minio_dev_data:
