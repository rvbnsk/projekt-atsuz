version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: editorial_db
    environment:
      POSTGRES_DB: editorial_archive
      POSTGRES_USER: archive_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-archive_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive_user -d editorial_archive"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: editorial_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./editorial-archive-backend
      dockerfile: Dockerfile
    container_name: editorial_backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/editorial_archive
      DB_USERNAME: archive_user
      DB_PASSWORD: ${DB_PASSWORD:-archive_pass}
      JWT_SECRET: ${JWT_SECRET:-changeme-at-least-32-chars-long-secret}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: editorial-archive
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./editorial-archive-frontend
      dockerfile: Dockerfile
    container_name: editorial_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}

volumes:
  postgres_data:
  minio_data:
